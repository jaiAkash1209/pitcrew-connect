<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitCrew Connect | Register</title>
  <meta
    name="description"
    content="Create a user account for PitCrew Connect."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html">
        <span class="brand-mark">PC</span>
        <span>PitCrew Connect</span>
      </a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
      </nav>
      <a class="nav-cta" href="login.html">Back to login</a>
    </div>
  </header>

  <main>
    <section class="hero inner-hero">
      <div class="container">
        <div class="section-heading">
          <p class="eyebrow">Register</p>
          <h1>Create Account</h1>
        </div>

        <form class="request-form login-form centered-form" id="registerForm">
          <label class="full-width">
            Account type
            <select name="role" id="registerRole" required>
              <option value="user">User account</option>
              <option value="mechanic">Mechanic account</option>
            </select>
          </label>
          <label class="full-width">
            Full name
            <input type="text" name="name" placeholder="Enter your full name" required>
          </label>
          <label>
            Email
            <input type="email" name="email" placeholder="Enter your email" required>
          </label>
          <label>
            Password
            <input type="password" name="password" placeholder="Create a password" required>
          </label>
          <div class="full-width mechanic-register-fields" id="mechanicRegisterFields" hidden>
            <div class="request-form nested-form">
              <label>
                Phone number
                <input type="tel" name="phone" placeholder="Enter phone number">
              </label>
              <label>
                Workshop name
                <input type="text" name="business" placeholder="Enter shop name">
              </label>
              <label class="full-width">
                Shop address
                <input type="text" name="shopAddress" placeholder="Enter full shop address">
              </label>
              <label>
                Experience
                <input type="text" name="experience" placeholder="e.g. 6 years">
              </label>
              <label>
                Service area
                <input type="text" name="location" placeholder="City or area">
              </label>
              <label>
                Service focus
                <input type="text" name="service" placeholder="Roadside, garage, home visit">
              </label>
              <label class="full-width">
                Specialties
                <textarea name="specialties" rows="3" placeholder="Diagnostics, electrical, engine..."></textarea>
              </label>
              <label>
                Aadhaar card photo
                <input type="file" name="aadhaarPhoto" accept="image/*">
              </label>
              <label>
                Shop photo
                <input type="file" name="shopPhoto" accept="image/*">
              </label>
            </div>
          </div>
          <button type="submit" class="button button-primary full-width">Create account</button>
          <p class="form-message" id="registerMessage" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-shell">
      <div>
        <a class="brand footer-brand" href="index.html">
          <span class="brand-mark">PC</span>
          <span>PitCrew Connect</span>
        </a>
        <p>User account registration.</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
