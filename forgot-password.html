<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PitCrew Connect | Forgot Password</title>
  <meta
    name="description"
    content="Reset the password for a user, mechanic, or admin account in PitCrew Connect."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html">
        <span class="brand-mark">PC</span>
        <span>PitCrew Connect</span>
      </a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Create Account</a>
      </nav>
      <a class="nav-cta" href="login.html">Back to login</a>
    </div>
  </header>

  <main>
    <section class="hero inner-hero">
      <div class="container">
        <div class="section-heading">
          <p class="eyebrow">Password Reset</p>
          <h1>Reset account password</h1>
          <p>Enter the account email, select the role, and set a new password.</p>
        </div>

        <form class="request-form centered-form" id="forgotPasswordForm">
          <label>
            Account role
            <select name="role" required>
              <option value="user">User</option>
              <option value="mechanic">Mechanic</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <label>
            Email
            <input type="email" name="email" placeholder="Enter your account email" required>
          </label>
          <label>
            New password
            <input type="password" name="newPassword" placeholder="Enter new password" required>
          </label>
          <label>
            Confirm password
            <input type="password" name="confirmPassword" placeholder="Confirm new password" required>
          </label>
          <button type="submit" class="button button-primary full-width">Reset password</button>
          <p class="form-message" id="forgotPasswordMessage" aria-live="polite"></p>
        </form>

        <div class="auth-switch">
          <p>Remember your password now?</p>
          <div class="auth-switch-actions">
            <a class="button button-secondary" href="login.html">Return to login</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-shell">
      <div>
        <a class="brand footer-brand" href="index.html">
          <span class="brand-mark">PC</span>
          <span>PitCrew Connect</span>
        </a>
        <p>Password reset access for registered accounts.</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
